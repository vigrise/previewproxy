name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config cmake nasm ffmpeg \
            libdav1d-dev libheif-dev

      - name: Run tests
        run: cargo test

  build-binaries:
    name: Build - ${{ matrix.target }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: previewproxy-linux-x86_64
            ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: previewproxy-linux-aarch64
            ext: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: previewproxy-darwin-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: previewproxy-darwin-aarch64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: previewproxy-windows-x86_64
            ext: .exe
          # windows-11-arm is disabled: rav1e dropped aarch64-pc-windows-msvc support,
          # causing LNK1181 linker errors due to missing assembly object files.
          # Cross-compiling from windows-latest is not viable either since rav1e's
          # assembly build fails regardless of host. Re-enable when rav1e supports this target.
          # - os: windows-11-arm
          #   target: aarch64-pc-windows-msvc
          #   artifact: previewproxy-windows-aarch64
          #   ext: .exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install native dependencies (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config cmake nasm \
            libdav1d-dev libheif-dev

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config cmake nasm dav1d libheif

      - name: Install native dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install dav1d libheif --triplet x64-windows-static-md

      - name: Build
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:\vcpkg' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/previewproxy${{ matrix.ext }} ${{ matrix.artifact }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  docker:
    name: Docker
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    needs: [build-binaries, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
